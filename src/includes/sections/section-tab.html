<div class="tab-pane relative hidden" id="@@tab.id">
  <!-- Fixed video: inside the z-1 section's stacking context → z-1 in root → bg-white z-10 sections cover it -->
  <div class="fixed inset-0 w-full">
    <video
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
      class="w-full h-full object-cover"
    >
      <source src="assets/@@tab.videoSrc" type="video/mp4" />
    </video>
    <div class="absolute inset-0 bg-black/40"></div>
  </div>
  <!-- Hero content: z-10 within pane → appears above fixed video locally -->
  <div class="container relative z-10 text-white pt-[11.688rem] lg:pt-20">
    <div class="flex flex-col pt-22">
      <h1
        class="text-5xl md:text-7xl leading-[1.13] font-semibold uppercase max-w-180 lg:mb-10 order-1"
        data-i18n="hero.title"
      >
        @@tab.headingHtml
      </h1>
      <p
        class="text-base lg:text-2xl font-normal max-lg:mt-1.5 lg:max-w-90 lg:mt-35.5 lg:ml-150 xl:ml-224.5 order-2 lg:order-3"
        data-i18n="hero.desc"
      >
        @@tab.description
      </p>
      <div class="order-3 lg:order-2 max-lg:mt-10">
        <!-- Button inlined: nested @@include args cannot contain @@ tokens (plugin regex: {[^@]*}) -->
        <a
          href="@@tab.buttonHref"
          class="btn-group group overflow-hidden bg-white border border-gray-200 text-sm md:text-base font-medium text-black py-1 ps-1 lg:ps-3 pe-1 inline-flex items-center lg:gap-3 rounded-full transition-all duration-300"
        >
          <span class="relative inline-block overflow-hidden mx-4">
            <span
              class="inline-block group-hover:translate-y-[-200%] transition-all duration-500 ease-in-out"
              >@@tab.buttonText</span
            >
            <span
              class="absolute top-0 start-0 inline-block translate-y-[200%] group-hover:translate-y-0 transition-all duration-500 ease-in-out"
              >@@tab.buttonText</span
            >
          </span>
          <span
            class="relative flex items-center justify-center size-10 rounded-full bg-black group-hover:bg-gray-300 transition-colors duration-500 overflow-hidden rtl:scale-x-[-1]"
          >
            <span
              class="absolute inset-0 m-auto size-0 transition-all bg-gray-300 group-hover:size-10 rounded-full"
            ></span>
            <i
              class="size-4 lg:size-4.5 flex items-center justify-center transition-all duration-500 group-hover:translate-x-[200%] group-hover:-translate-y-[200%]"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 256 256"
                fill="currentColor"
                class="size-full text-white"
              >
                <path
                  d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
                ></path>
              </svg>
            </i>
            <i
              class="size-4.5 lg:size-5 absolute flex items-center justify-center -translate-x-[200%] translate-y-[200%] group-hover:translate-x-0 group-hover:translate-y-0 transition-all duration-500"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 256 256"
                fill="currentColor"
                class="size-full text-black"
              >
                <path
                  d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
                ></path>
              </svg>
            </i>
          </span>
        </a>
      </div>
    </div>
  </div>
</div>
