<div class="accordion-item border-b-[0.09375rem] border-black bg-gray-100">
  <button
    class="accordion-trigger group flex items-start w-full py-8 text-start relative focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-lightblue focus-visible:ring-inset cursor-pointer"
    aria-expanded="false"
    aria-controls="accordion-content-@@item_id"
    id="accordion-header-@@item_id"
  >
    <!-- Left Number -->
    <div class="w-12 md:w-1/2 shrink-0">
      <span
        class="text-lg font-medium text-secondary-grey opacity-40 group-hover:opacity-100 group-aria-expanded:opacity-100 w-12 md:w-20 block select-none transition-opacity duration-300"
      >
        (@@item_number)
      </span>
    </div>

    <!-- Header Title -->
    <div class="relative flex items-center ms-4 md:ms-0 flex-1">
      <span
        class="inline-block text-[1.375rem] group-aria-expanded:text-2xl font-medium xl:max-w-66.5 transition-all duration-300"
      >
        @@item_title
      </span>
    </div>

    <!-- Right Icon -->
    <div
      class="ms-auto md:ms-0 md:w-20 flex items-start md:justify-center text-primary-deepblue shrink-0"
    >
      <svg
        class="w-6 lg:w-8 2xl:w-9 h-auto"
        width="36"
        height="34"
        viewBox="0 0 36 34"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M6 17H29.375"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="transition-opacity duration-300 md:group-aria-expanded:opacity-0"
        />
        <path
          d="M17.6875 5.3125V28.6875"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="transition-opacity duration-300 group-aria-expanded:opacity-0"
        />
      </svg>
    </div>
  </button>

  <!-- Expanded Content -->
  <div
    id="accordion-content-@@item_id"
    role="region"
    aria-labelledby="accordion-header-@@item_id"
    class="accordion-panel ps-12 md:ps-20"
    style="display: none"
  >
    <div class="pb-10 pt-4 pe-4 md:pe-0">
      <div class="flex flex-col gap-10 md:gap-0">
        <!-- Mobile Text Block (Paragraph + Link) - Hidden on Desktop -->
        <div class="md:hidden flex flex-col">
          <p class="text-15px leading-[1.467] text-primary-grey">
            @@item_description
          </p>
          <div class="mt-[1.813rem]">
            <a
              href="@@item_link_href"
              class="group/link inline-flex items-center gap-2 text-sm font-medium hover:text-primary-lightblue transition-colors duration-300"
            >
              @@item_link_text
              <i
                class="size-4.5 rtl:-scale-x-100 rtl:group-hover/link:-rotate-45 group-hover/link:rotate-45 transition-transform duration-300"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 18 18"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M5.25 12.75L12.75 5.25"
                    stroke="currentColor"
                    stroke-width="1.65466"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M5.25 5.25H12.75V12.75"
                    stroke="currentColor"
                    stroke-width="1.65466"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </i>
            </a>
          </div>
        </div>
      </div>

      <!-- Images Row (Scrollable) -->
      <div
        class="flex items-start overflow-x-auto no-scrollbar max-md:mt-[1.813rem]"
      >
        <!-- Image 1 -->
        <div class="w-67.5 h-44 shrink-0 bg-gray-50">
          <img
            src="assets/left-0.jpg"
            alt="@@item_title - Primary Facility View"
            class="w-full h-full object-cover rounded-xl"
          />
        </div>

        <!-- Gap of 1rem -->
        <div class="w-4 shrink-0"></div>

        <!-- Image 2 -->
        <div class="w-67.5 h-44 shrink-0 bg-gray-50">
          <img
            src="assets/left-1.jpg"
            alt="@@item_title - Interior Logistics Area"
            class="w-full h-full object-cover rounded-xl"
          />
        </div>

        <!-- Desktop Desktop Gap / Mobile 1rem Gap -->
        <div class="hidden md:block w-[5.092rem] shrink-0"></div>
        <div class="md:hidden w-4 shrink-0"></div>

        <!-- Desktop Text block (Paragraph + Link) - Hidden on Mobile -->
        <div class="hidden md:block flex-1 min-w-[20rem] max-w-[42.313rem]">
          <p
            class="text-[0.9375rem] leading-[1.467] font-medium text-primary-grey"
          >
            @@item_description
          </p>
          <div class="mt-4">
            <a
              href="@@item_link_href"
              class="group/link inline-flex items-center gap-2 lg:gap-4 text-sm font-medium hover:text-primary-lightblue transition-colors duration-300"
            >
              @@item_link_text
              <i
                class="size-4.5 rtl:-scale-x-100 rtl:group-hover/link:-rotate-45 group-hover/link:rotate-45 transition-transform duration-300"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 18 18"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M5.25 12.75L12.75 5.25"
                    stroke="currentColor"
                    stroke-width="1.65466"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M5.25 5.25H12.75V12.75"
                    stroke="currentColor"
                    stroke-width="1.65466"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </i>
            </a>
          </div>
        </div>

        <!-- Desktop Gap -->
        <div class="hidden md:block w-[4.109rem] shrink-0"></div>

        <!-- Image 3 -->
        <div class="w-67.5 h-44 shrink-0 bg-gray-50">
          <img
            src="assets/right.jpg"
            alt="@@item_title - External Infrastructure"
            class="w-full h-full object-cover rounded-xl"
          />
        </div>
      </div>
    </div>
  </div>
</div>
