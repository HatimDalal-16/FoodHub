<div class="accordion-item border-b-[0.09375rem] border-black">
  <button
    class="accordion-trigger group flex items-center w-full py-8 text-left transition-all relative focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-lightblue focus-visible:ring-inset cursor-pointer"
    aria-expanded="false"
    aria-controls="accordion-content-@@item_id"
    id="accordion-header-@@item_id"
  >
    <!-- Left Number -->
    <span
      class="text-lg font-medium text-secondary-grey group-aria-expanded:text-black w-12 md:w-20 shrink-0 select-none transition-colors duration-300"
    >
      (@@item_number)
    </span>

    <!-- Header Title -->
    <div
      class="relative md:absolute md:left-1/2 md:right-20 flex items-center ml-4 md:ml-0 flex-1 md:flex-none"
    >
      <span
        class="text-[1.375rem] group-aria-expanded:text-2xl font-medium uppercase transition-all duration-300"
      >
        @@item_title
      </span>
    </div>

    <!-- Right Icon -->
    <div
      class="ml-auto flex items-center justify-center transition-all duration-300 text-primary-deepblue shrink-0"
    >
      <i class="ph ph-plus text-xl md:text-2xl group-aria-expanded:hidden"></i>
      <i
        class="ph ph-minus text-xl md:text-2xl hidden group-aria-expanded:block md:group-aria-expanded:hidden"
      ></i>
    </div>
  </button>

  <!-- Expanded Content -->
  <div
    id="accordion-content-@@item_id"
    role="region"
    aria-labelledby="accordion-header-@@item_id"
    class="accordion-panel invisible max-h-0 overflow-hidden transition-all duration-300 ease-in-out bg-white pl-12 md:pl-20"
  >
    <div class="pb-10 pt-4 pr-4 md:pr-0">
      <div class="flex flex-col gap-10 md:gap-0">
        <!-- Mobile Text Block (Paragraph + Link) - Hidden on Desktop -->
        <div class="md:hidden flex flex-col">
          <p class="text-15px leading-[1.467] text-primary-grey">
            @@item_description
          </p>
          <div class="mt-[1.813rem]">
            <a
              href="@@item_link_href"
              class="group/link inline-flex items-center gap-6 text-sm font-medium transition-all duration-300"
            >
              <span class="relative inline-block overflow-hidden">
                <span
                  class="inline-block group-hover/link:translate-y-[-200%] transition-transform duration-500 ease-in-out"
                >
                  @@item_link_text
                </span>
                <span
                  class="absolute top-0 inset-s-0 inline-block translate-y-[200%] group-hover/link:translate-y-0 transition-transform duration-500 ease-in-out"
                >
                  @@item_link_text
                </span>
              </span>
              <span
                class="relative flex items-center justify-center overflow-hidden rtl:scale-x-[-1]"
              >
                <i
                  class="size-4.5 flex items-center justify-center transition-transform duration-500 group-hover/link:translate-x-full group-hover/link:-translate-y-full"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                  >
                    <path
                      d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
                    ></path>
                  </svg>
                </i>
                <i
                  class="size-4.5 absolute flex items-center justify-center -translate-x-full translate-y-full group-hover/link:translate-x-0 group-hover/link:translate-y-0 transition-transform duration-500"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                  >
                    <path
                      d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
                    ></path>
                  </svg>
                </i>
              </span>
            </a>
          </div>
        </div>
      </div>

      <!-- Images Row (Scrollable) -->
      <div
        class="flex items-start overflow-x-auto no-scrollbar max-md:mt-[1.813rem]"
      >
        <!-- Image 1 -->
        <div class="w-67.5 h-44 shrink-0 bg-gray-50">
          <img
            src="assets/left-0.jpg"
            alt="@@item_title - Primary Facility View"
            class="w-full h-full object-cover rounded-xl"
          />
        </div>

        <!-- Gap of 1rem -->
        <div class="w-4 shrink-0"></div>

        <!-- Image 2 -->
        <div class="w-67.5 h-44 shrink-0 bg-gray-50">
          <img
            src="assets/left-1.jpg"
            alt="@@item_title - Interior Logistics Area"
            class="w-full h-full object-cover rounded-xl"
          />
        </div>

        <!-- Desktop Desktop Gap / Mobile 1rem Gap -->
        <div class="hidden md:block w-[5.092rem] shrink-0"></div>
        <div class="md:hidden w-4 shrink-0"></div>

        <!-- Desktop Text block (Paragraph + Link) - Hidden on Mobile -->
        <div class="hidden md:block flex-1 min-w-[20rem] max-w-[42.313rem]">
          <p
            class="text-[0.9375rem] leading-[1.467] font-medium text-primary-grey"
          >
            @@item_description
          </p>
          <div class="mt-4">
            <a
              href="@@item_link_href"
              class="group/link inline-flex items-center gap-6 text-sm font-medium transition-all duration-300"
            >
              <span class="relative inline-block overflow-hidden">
                <span
                  class="inline-block group-hover/link:translate-y-[-200%] transition-transform duration-500 ease-in-out"
                >
                  @@item_link_text
                </span>
                <span
                  class="absolute top-0 inset-s-0 inline-block translate-y-[200%] group-hover/link:translate-y-0 transition-transform duration-500 ease-in-out"
                >
                  @@item_link_text
                </span>
              </span>
              <span
                class="relative flex items-center justify-center overflow-hidden rtl:scale-x-[-1]"
              >
                <i
                  class="size-4.5 flex items-center justify-center transition-transform duration-500 group-hover/link:translate-x-full group-hover/link:-translate-y-full"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                  >
                    <path
                      d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
                    ></path>
                  </svg>
                </i>
                <i
                  class="size-4.5 absolute flex items-center justify-center -translate-x-full translate-y-full group-hover/link:translate-x-0 group-hover/link:translate-y-0 transition-transform duration-500"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                  >
                    <path
                      d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
                    ></path>
                  </svg>
                </i>
              </span>
            </a>
          </div>
        </div>

        <!-- Desktop Gap -->
        <div class="hidden md:block w-[4.109rem] shrink-0"></div>

        <!-- Image 3 -->
        <div class="w-67.5 h-44 shrink-0 bg-gray-50">
          <img
            src="assets/right.jpg"
            alt="@@item_title - External Infrastructure"
            class="w-full h-full object-cover rounded-xl"
          />
        </div>
      </div>
    </div>
  </div>
</div>
