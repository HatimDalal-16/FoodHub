<article
  class="news-card group relative w-[26.969rem] rounded-xl overflow-hidden cursor-pointer transition-colors duration-300 hover:bg-primary-lightgrey"
  aria-labelledby="news-title-@@id"
>
  <!-- Card Image -->
  <div class="w-full h-[258px] rounded-xl overflow-hidden">
    <img
      src="@@imgSrc"
      alt="@@imgAlt"
      class="w-full h-full object-cover"
      loading="lazy"
    />
  </div>

  <!-- Card Content -->
  <div class="flex items-start gap-4 p-6 max-md:px-4 max-md:py-6">
    <!-- Text Content -->
    <div class="flex-1 min-w-0">
      <h3
        id="news-title-@@id"
        class="text-lg font-semibold font-body leading-tight text-primary-deepblue line-clamp-2"
      >
        <!-- Stretched link: covers the entire card -->
        <a href="@@href" class="after:absolute after:inset-0"> @@title </a>
      </h3>
      <p class="mt-2 text-sm font-normal text-light leading-snug line-clamp-2">
        @@description
      </p>
    </div>

    <!-- Arrow Icon -->
    <span
      class="relative shrink-0 flex items-center justify-center size-10 rounded-full bg-primary-lightgrey group-hover:bg-black transition-colors duration-300 overflow-hidden rtl:scale-x-[-1] self-end"
      aria-hidden="true"
    >
      <!-- Light icon (visible by default, hides on hover) -->
      <i
        class="size-4.5 flex items-center justify-center transition-all duration-500 group-hover:translate-x-full group-hover:-translate-y-full"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 256 256"
          fill="currentColor"
          class="size-full text-black/40"
          aria-hidden="true"
        >
          <path
            d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
          ></path>
        </svg>
      </i>

      <!-- Dark icon (slides in on hover) -->
      <i
        class="size-4.5 absolute flex items-center justify-center -translate-x-full translate-y-full group-hover:translate-x-0 group-hover:translate-y-0 transition-all duration-500"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 256 256"
          fill="currentColor"
          class="size-full text-white"
          aria-hidden="true"
        >
          <path
            d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"
          ></path>
        </svg>
      </i>
    </span>
  </div>
</article>
